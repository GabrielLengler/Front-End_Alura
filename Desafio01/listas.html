<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas no HTML</title>
</head>
<body>
    
 <h2>Listas</h2>

    <p>Lista Ordenada</p>

    <ol type="1" start="5">

        <li>colocar os ovos na batedeira</li>
        <li>colocar a farinha</li>
        <li>colocar o açúcar</li>
        <li>colocar o leite</li>

    </ol>


    <p>Lista desordenada</p>
    
    <ul>
    
        <li>comprar café</li>
        <li>comprar pão</li>
        <li>comprar sabão</li>
   
    </ul>


    <li>comprar produtos de limpeza
        <ul>
            <li>sabão</li>
            <li>detergente</li>
            <li>água sanitária</li>
        </ul>
    </li>

</body>
</html>
